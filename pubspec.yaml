name: mortgage_us
description: MortgageUS - US Mortgage Payment Calculator
publish_to: 'none'
version: 1.0.9+9

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  calcwise_core:
    path: ../packages/calcwise_core
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  intl: ^0.20.0
  fl_chart: ^0.68.0
  pdf: ^3.11.1
  printing: ^5.13.1
  share_plus: ^10.1.4
  path_provider: ^2.1.4
  in_app_review: ^2.0.9
  google_mobile_ads: ^5.1.0
  shared_preferences: ^2.2.3
  in_app_purchase: ^3.2.0
  sqflite: ^2.3.3
  path: ^1.9.0
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3
  collection: ^1.18.0
  url_launcher: ^6.3.0
  flutter_local_notifications: ^18.0.1
  flutter_native_splash: ^2.4.3

dev_dependencies:
  calcwise_lint:
    git:
      url: https://github.com/abassimaj123/calcwise_core.git
      path: calcwise_lint
      ref: main
  custom_lint: ">=0.6.0 <0.8.0"
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/branding/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600

flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "assets/icons/icon_main.png"
  adaptive_icon_background: "#1B3A6B"
  adaptive_icon_foreground: "assets/icons/icon_fg.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false



